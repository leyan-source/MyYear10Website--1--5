        /* Background & body styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8; /* nice light background */
        }

        /* Navbar styling */
        .navbar {
            background-color: #333;
        }
        .navbar ul {
            list-style: none;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
        }
        .navbar li {
            margin-right: 15px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .navbar a:hover {

        }

        /* Hero section */
        .hero {

        .hero-text {
            font-size: 2rem;

            color: #333;
        }

            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        /* Individual topic card */
        .topic-card {
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            text-align: center;
            background-color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .topic-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .topic-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .topic-card-text {
            padding: 10px 0;
            font-weight: bold;
            color: #333;
        }
